name: Build Unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: bash scripts/build_unsigned_ipa.sh

      - name: Build dylib
        run: bash scripts/build_dylib.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HelloIPA-unsigned
          path: |
            build-output/HelloIPA.ipa
            build-output/AppControlDylib.dylib
          if-no-files-found: error
